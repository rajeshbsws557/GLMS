<!DOCTYPE html>
<!--
============================================================================
ফাইল: index.html — লগইন ও রেজিস্ট্রেশন পৃষ্ঠা
============================================================================

উদ্দেশ্য:
অ্যাপ্লিকেশনের প্রবেশ বিন্দু। একটি কেন্দ্রীভূত কার্ডের মধ্যে লগইন এবং
রেজিস্ট্রেশন ফর্ম প্রদান করে। ব্যবহারকারীরা ড্যাশবোর্ডে প্রবেশের আগে
এখানে প্রমাণীকরণ (authenticate) করে।

প্রযুক্তি:
- Tailwind CSS v3 (CDN) — স্পেসিং, ফ্লেক্স, টাইপোগ্রাফির জন্য utility ক্লাস
- custom.css — সবুজ+সাদা থিম ভেরিয়েবল, ফর্ম কন্ট্রোল, auth-নির্দিষ্ট স্টাইল
- auth.js — ফর্ম হ্যান্ডলিং (fetch + localStorage)
- config.js — API বেস URL

ভাইভা নোট:
লগইন এবং রেজিস্ট্রেশন দুটোই একই পৃষ্ঠায় আছে, JS দিয়ে টগল করা হয়।
এতে পুরো পৃষ্ঠা রিলোড এড়ানো যায় এবং আরও মসৃণ অভিজ্ঞতা দেয়।
============================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bakir Khata — Track money lent and borrowed with friends and family.">
    <title>Bakir Khata — Sign In</title>

    <!-- Tailwind CSS (Play CDN — রানটাইম, ডেমোর জন্য ঠিক আছে) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- কাস্টম সবুজ+সাদা থিম + কম্পোনেন্ট -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- সাধারণ টেক্সট ফেভিকন -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>$</text></svg>">
</head>
<body>

    <!-- টোস্ট কন্টেইনার (JS দ্বারা পূরণ হয়) -->
    <div id="toast-container" class="toast-wrap"></div>

    <!-- কেন্দ্রীভূত auth কার্ড -->
    <div class="auth-wrapper">
        <div class="auth-box">

            <!-- শিরোনাম -->
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold tracking-tight" style="color:var(--accent)">Bakir Khata</h1>
                <p class="text-sm mt-1" style="color:var(--text-dim)">
                    Track what you owe &amp; what you're owed
                </p>
            </div>

            <!-- ট্যাব -->
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchTab('login')">
                    Sign In
                </button>
                <button id="tab-register" class="auth-tab" onclick="switchTab('register')">
                    Create Account
                </button>
            </div>

            <!-- ============================================================
                 লগইন ফর্ম
                 ============================================================
                 onsubmit="return handleLogin(event)" আমাদের JS হ্যান্ডলার
                 কল করে এবং ডিফল্ট পৃষ্ঠা-রিলোডিং ফর্ম সাবমিশন প্রতিরোধ করে।

                 প্রতিটি input ব্যবহার করে:
                 - id: যাতে JS getElementById দিয়ে মান পেতে পারে
                 - type: ব্রাউজারকে বলে কোন ধরনের ডেটা প্রত্যাশিত
                 - required: HTML5 ভ্যালিডেশন গেট
                 - autocomplete: ব্রাউজারকে সংরক্ষিত credential সাজেস্ট করতে দেয়
                 ============================================================ -->
            <form id="form-login" onsubmit="return handleLogin(event)">
                <div class="mb-4">
                    <label for="login-email" class="form-label">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <div class="mb-5">
                    <label for="login-password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="login-password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                <button type="submit" id="btn-login" class="btn btn-primary w-full">
                    Sign In
                </button>
            </form>

            <!-- ============================================================
                 রেজিস্ট্রেশন ফর্ম (ডিফল্টে লুকানো)
                 ============================================================ -->
            <form id="form-register" style="display:none" onsubmit="return handleRegister(event)">
                <div class="mb-4">
                    <label for="reg-name" class="form-label">Full Name</label>
                    <input
                        type="text"
                        id="reg-name"
                        class="form-input"
                        placeholder="John Doe"
                        required
                        autocomplete="name"
                    >
                </div>
                <div class="mb-4">
                    <label for="reg-email" class="form-label">Email</label>
                    <input
                        type="email"
                        id="reg-email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <div class="mb-4">
                    <label for="reg-password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="reg-password"
                        class="form-input"
                        placeholder="At least 6 characters"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>
                <div class="mb-5">
                    <label for="reg-confirm" class="form-label">Confirm Password</label>
                    <input
                        type="password"
                        id="reg-confirm"
                        class="form-input"
                        placeholder="Repeat password"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>
                <button type="submit" id="btn-register" class="btn btn-primary w-full">
                    Create Account
                </button>
            </form>

            <p class="text-center text-xs mt-5" style="color:var(--text-faint)">
                DBMS Mini-Project &middot; Bakir Khata
            </p>
        </div>
    </div>

    <!-- JS: প্রথমে config (API_BASE_URL সংজ্ঞায়িত করে), তারপর auth লজিক -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
